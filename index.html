<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday DX</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:black;
    overflow:hidden;
}

/* 🎬 视频 */
#videoPage{
    width:100%;
    height:100vh;
    background:black;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* 🎂 主页面 */
#main{
    display:none;
    width:100%;
    height:100vh;
    background:url("bg.jpg") center/cover no-repeat;
    color:white;
    text-align:center;
    position:relative;
}

/* 遮罩 */
.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.45);
}

/* 内容 */
.content{
    position:relative;
    top:20%;
}

/* 蛋糕 */
.cake{
    font-size:90px;
    cursor:pointer;
}

/* 字幕容器 */
#text{
    width:80%;
    margin:auto;
    text-align:center;
}

/* 每行字幕 */
.line{
    display:block;
    font-size:20px;
    margin:6px 0;
    opacity:0;
    animation:fadeIn 0.5s forwards;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<!-- 🎵 音乐 -->
<audio id="bgm" loop>
    <source src="music.mp3">
</audio>

<!-- 🎬 视频 -->
<div id="videoPage">
    <video id="video" playsinline>
        <source src="intro.mp4" type="video/mp4">
    </video>
</div>

<!-- 🎂 主页面 -->
<div id="main">

    <div class="overlay"></div>

    <div class="content">
        <h1>Happy Birthday 🎉</h1>

        <div class="cake" onclick="cakeClick()">🎂🕯️</div>

        <div id="text"></div>
    </div>

</div>

<script>

/* ⭐ 防重复启动锁（核心） */
let started = false;

/* ✍️ 字幕内容 */
const msg=[
"丁丁，生日快乐 🎉",
"工作顺利，烦恼少少。",
"希望你以后年年岁岁，",
"都能看到新的风景。",
"遇到更多爱你的人，",
"自由尽兴，身体健康。",
"永远支持你的小孙 ❤️"
];

let i=0;

/* 🚀 启动 */
function startVideo(){

    let v=document.getElementById("video");

    v.play().catch(()=>{});

    /* ⭐ 关键：只用结束触发 */
    v.onended=function(){
        showMain();
    };
}

/* 🎬 显示主页面 */
function showMain(){

    if(started) return;   // ⭐ 防止重复进入
    started = true;

    document.getElementById("videoPage").style.display="none";
    document.getElementById("main").style.display="block";

    document.getElementById("bgm").play().catch(()=>{});

    typeLine();
}

/* ✍️ 字幕（稳定版） */
function typeLine(){

    if(i < msg.length){

        let line=document.createElement("div");
        line.className="line";

        document.getElementById("text").appendChild(line);

        let j=0;

        function typeChar(){
            if(j < msg[i].length){
                line.textContent += msg[i][j];
                j++;
                setTimeout(typeChar,90);
            }else{
                i++;
                setTimeout(typeLine,600);
            }
        }

        typeChar();
    }
}

/* 🎂 蛋糕 */
function cakeClick(){
    document.querySelector(".cake").innerHTML="🎂✨";
}

/* 🚀 自动启动视频（页面加载后执行） */
window.onload=function(){
    startVideo();
};

</script>

</body>
</html>
