<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday DX</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:black;
    overflow:hidden;
}

/* 🎬 封面 */
#cover{
    width:100%;
    height:100vh;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

#cover button{
    padding:12px 28px;
    border:none;
    border-radius:30px;
    font-size:20px;
    cursor:pointer;
}

/* 🎬 视频页 */
#videoPage{
    display:none;
    width:100%;
    height:100vh;
    background:black;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* 🎂 主页面 */
#main{
    display:none;
    width:100%;
    height:100vh;
    background:url("bg.webp") center/cover no-repeat;
    color:white;
    text-align:center;
    position:relative;
}

/* 遮罩 */
.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.45);
}

/* 内容 */
.content{
    position:relative;
    top:20%;
    z-index:2;
}

/* 蛋糕 */
.cake{
    font-size:90px;
    cursor:pointer;
    transition:.3s;
}

.cake:hover{
    transform:scale(1.08);
}

/* 字幕 */
#text{
    width:80%;
    margin:auto;
    text-align:center;
}

.line{
    display:block;
    font-size:20px;
    margin:6px 0;
}

/* 🎁 图片弹窗 */
#photoModal{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.88);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#photoModal img{
    max-width:90%;
    max-height:85%;
    border-radius:16px;
    box-shadow:0 0 30px rgba(255,255,255,.5);
    animation:zoom .5s ease;
}

@keyframes zoom{
    from{
        transform:scale(.5);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}
</style>
</head>

<body>

<!-- 🎵 音乐 -->
<audio id="bgm" loop>
    <source src="music.mp3">
</audio>

<!-- 🎬 封面 -->
<div id="cover">
    <h1>🎂 Happy Birthday</h1>
    <button onclick="start()">DD</button>
</div>

<!-- 🎬 视频 -->
<div id="videoPage">
    <video id="video" playsinline>
        <source src="intro.mp4" type="video/mp4">
    </video>
</div>

<!-- 🎂 主页面 -->
<div id="main">

    <div class="overlay"></div>

    <div class="content">
        <h1>Happy Birthday 🎉</h1>

        <div class="cake" onclick="cakeClick()">🎂🎂</div>

        <div id="text"></div>
    </div>

</div>

<!-- 🎁 照片弹窗 -->
<div id="photoModal" onclick="closePhoto()">
    <img src="photo.webp" alt="Birthday Photo">
</div>

<script>

const msg=[
"丁丁，生日快乐 🎉",
"工作顺利，烦恼少少。",
"希望你以后年年岁岁，",
"都能看到新的风景。",
"遇到更多爱你的人，",
"自由尽兴，身体健康。",
"------孙孙 ❤️"
];

let i=0;
let started=false;

/* 🚀 点击封面 */
function start(){

    document.getElementById("cover").style.display="none";
    document.getElementById("videoPage").style.display="block";

    let v=document.getElementById("video");

    v.play().catch(()=>{});

    v.onended=showMain;
}

/* 🎬 进入主页 */
function showMain(){

    if(started) return;

    started=true;

    document.getElementById("videoPage").style.display="none";
    document.getElementById("main").style.display="block";

    document.getElementById("bgm").play().catch(()=>{});

    typeLine();
}

/* ✍️ 打字机效果 */
function typeLine(){

    if(i < msg.length){

        let line=document.createElement("div");
        line.className="line";

        document.getElementById("text").appendChild(line);

        let j=0;

        function typeChar(){

            if(j < msg[i].length){

                line.textContent += msg[i][j];

                j++;

                setTimeout(typeChar,90);

            }else{

                i++;

                setTimeout(typeLine,500);

            }
        }

        typeChar();
    }
}

/* 🎂 点击蛋糕 */
function cakeClick(){

    document.querySelector(".cake").innerHTML="🕯️🎂";

    document.getElementById("photoModal").style.display="flex";
}

/* ❌ 关闭照片 */
function closePhoto(){

    document.getElementById("photoModal").style.display="none";
}
</script>

</body>
</html>
